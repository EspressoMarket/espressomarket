name: Generate Briefing

on:
  schedule:
    - cron: '50 4 * * 1-5'  # 07:00 CEST (05:00 UTC)
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Generate briefing
        env:
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
          BEEHIIV_API_KEY:        ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          NEWS_API_KEY:           ${{ secrets.NEWS_API_KEY }}
        run: python generate_briefing.py

      - name: Commit updated briefing
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/briefing.json
          git diff --staged --quiet || git commit -m "Update briefing $(date +'%Y-%m-%d')"
          git push
